services:
  - type: web
    name: jprop-ads-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TOKEN_TONY
        sync: false
      - key: TOKEN_JPROP
        sync: false
      - key: TOKEN_AM
        sync: false
      - key: TOKEN_MAURICE
        sync: false
